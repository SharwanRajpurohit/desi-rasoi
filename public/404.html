<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Desi Rasoi</title>
    <script>
      // GitHub Pages SPA redirect: rewrites unknown paths to index.html
      (function () {
        var segment = 1
        var repo = '/desi-rasoi'
        var l = window.location
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            repo +
            '/?p=' +
            l.pathname.slice(1).split('/').slice(segment).join('/').replace(/&/g, '~and~') +
            (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        )
      })()
    </script>
  </head>
  <body></body>
</html>
